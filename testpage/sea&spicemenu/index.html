<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>香海鲜鱼庄 · Sea & Spice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<script src="menu-data.js?v=12"></script>
<style>
  :root{
    --bg:#480a11; --bg2:#5a0f12; --panel:#6a1018; --panel2:#5a0f12;
    --line:rgba(233,196,119,.22); --line2:rgba(233,196,119,.4);
    --cream:#f6ead0; --gold:#e9c477; --gold2:#f7da88; --gold-d:#cda968; --bronze:#9a6a3a;
    --muted:#d8c39a; --muted2:#bb9a68; --red-a:#a8312a;
    --ser:'Noto Serif SC',serif; --cor:'Cormorant Garamond',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;overscroll-behavior:none}
  body{background:radial-gradient(120% 80% at 50% 0%, #5a0f12 0%, #480a11 55%, #3a070d 100%);
    color:var(--cream);font-family:var(--ser);-webkit-font-smoothing:antialiased}
  ::-webkit-scrollbar{width:0;height:0}
  #app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .screen{animation:rise .28s ease both}
  .topbar{display:flex;align-items:center;gap:10px;padding:16px 18px 10px}
  .brand{display:flex;flex-direction:column;line-height:1}
  .brand .cn{font-family:var(--cor);font-weight:700;font-size:21px;color:var(--gold2);letter-spacing:2px}
  .brand .en{font-family:var(--ser);font-size:10px;letter-spacing:5px;color:var(--gold-d);margin-top:2px}
  .spacer{flex:1}
  .chip{display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line2);color:var(--gold);
    border-radius:30px;padding:6px 12px;font-size:12px;background:rgba(0,0,0,.18)}
  .chip.lang{cursor:pointer}
  .divider{display:flex;align-items:center;gap:14px;color:var(--gold-d);font-size:13px;letter-spacing:3px;margin:18px 18px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--line2),transparent)}
  .cta{display:block;width:100%;border:none;cursor:pointer;border-radius:16px;padding:17px;font-family:var(--ser);
    font-weight:700;font-size:16px;color:#3a070d;background:linear-gradient(180deg,#f7da88,#e9bb5e 60%,#c8923c);
    box-shadow:0 8px 26px rgba(201,127,31,.35),inset 0 1px 0 rgba(255,255,255,.4)}
  .cta:active{transform:translateY(1px)}
  .cta.disabled{filter:grayscale(.6) brightness(.6);box-shadow:none;cursor:not-allowed}
  .skiplink{display:block;width:100%;margin-top:10px;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:14px;padding:13px;font-family:var(--ser);font-size:14px;cursor:pointer}
  .skiplink:active{background:rgba(0,0,0,.2)}
  .backrow{display:flex;align-items:center;gap:12px;padding:14px 18px 6px}
  .back{background:rgba(0,0,0,.2);border:1px solid var(--line);color:var(--cream);border-radius:11px;padding:8px 14px;font-size:14px;cursor:pointer;font-family:var(--ser)}
  .htitle{font-size:20px;font-weight:700;color:var(--gold2)}
  .hsub{font-size:12px;color:var(--muted2);margin-top:2px}
  .footer{position:sticky;bottom:0;padding:14px 18px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(0deg,#480a11 70%,transparent)}
  .pax-wrap{flex:1;display:flex;flex-direction:column}
  .welcome{position:relative;padding:34px 20px 2px;text-align:center}
  .welcome .langbtn{position:absolute;top:24px;right:20px;border:1px solid var(--line2);color:var(--gold);background:rgba(0,0,0,.2);border-radius:11px;padding:7px 13px;font-size:13px;font-family:var(--ser);cursor:pointer}
  .welcome .wlogo{width:138px;height:138px;border-radius:30px;box-shadow:0 12px 30px rgba(0,0,0,.55);border:1px solid rgba(247,218,136,.25)}
  .wtitle{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:16px}
  .wtitle .txt{font-size:22px;color:var(--gold2);letter-spacing:7px;font-weight:600;text-indent:7px;font-family:var(--ser)}
  .wtitle .orn{height:17px;opacity:.92}
  .wtitle .orn.flip{transform:scaleX(-1)}
  .pax-body{flex:1;display:flex;align-items:center;justify-content:center;padding:10px 22px}
  .pax-foot{padding:6px 22px calc(22px + env(safe-area-inset-bottom))}
  .pax-cta{margin-top:0}
  .pax-card{width:100%;background:linear-gradient(180deg,rgba(122,20,28,.5),rgba(74,10,17,.28));border:1px solid var(--line2);border-radius:24px;padding:28px 22px 26px;display:flex;flex-direction:column;align-items:center;box-shadow:0 14px 34px rgba(0,0,0,.4),inset 0 1px 0 rgba(247,218,136,.12)}
  .pax-q{font-size:25px;font-weight:700;color:var(--gold2);font-family:var(--ser)}
  .pax-note{font-size:13px;color:var(--muted2);margin-top:5px;margin-bottom:22px}
  .stepper{display:flex;align-items:center;gap:18px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:60px;padding:8px 12px}
  .stepbtn{width:52px;height:52px;border-radius:50%;border:1px solid var(--line2);background:rgba(0,0,0,.25);color:var(--gold);font-size:26px;cursor:pointer;font-family:var(--cor)}
  .stepbtn:active{background:rgba(233,196,119,.18)}
  .pax-numwrap{display:flex;flex-direction:column;align-items:center;min-width:72px}
  .pax-num{font-family:var(--cor);font-size:54px;font-weight:700;color:var(--gold2);line-height:1}
  .pax-unit{font-size:13px;color:var(--muted2);margin-top:2px}
  .presets{display:flex;gap:9px;margin-top:22px}
  .preset{width:44px;height:44px;border-radius:50%;border:1px solid var(--line);background:rgba(0,0,0,.2);color:var(--cream);font-family:var(--cor);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .preset.on{background:linear-gradient(180deg,#f7da88,#c8923c);color:#3a070d;border-color:transparent;font-weight:700;box-shadow:0 4px 12px rgba(201,127,31,.4)}
  .pax-subline{margin-top:24px;font-size:13px;color:var(--muted)}
  .pax-subline b{font-family:var(--cor);font-size:23px;color:var(--gold2);font-weight:700;vertical-align:middle;margin:0 2px}
  .pax-subline .calc{color:var(--muted2);font-size:12px}
  .hero{margin:6px 18px 0;border-radius:22px;padding:22px;position:relative;overflow:hidden;min-height:212px;
    display:flex;flex-direction:column;align-items:flex-start;
    border:1px solid rgba(247,218,136,.5);box-shadow:0 14px 36px rgba(0,0,0,.5),inset 0 0 0 1px rgba(247,218,136,.12)}
  .hero .herobg{position:absolute;inset:0;background-size:cover;background-position:center 38%;z-index:0;transform:scale(1.02)}
  .hero .heroveil{position:absolute;inset:0;z-index:1;
    background:linear-gradient(100deg,rgba(36,5,8,.95) 0%,rgba(58,7,12,.8) 38%,rgba(60,8,12,.34) 66%,rgba(20,4,6,.25) 100%),
      linear-gradient(0deg,rgba(18,3,5,.8),rgba(18,3,5,0) 52%)}
  .hero>*{position:relative;z-index:2}
  .hero .badges{display:flex;gap:8px;margin-bottom:10px}
  .hero .bdg{background:linear-gradient(180deg,#f7da88,#d8a13e);color:#5a0f12;font-size:11px;font-weight:700;border-radius:7px;padding:4px 11px;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  .hero h1{margin:2px 0 4px;font-size:38px;font-weight:900;color:#fff;letter-spacing:1px;text-shadow:0 2px 12px rgba(0,0,0,.6)}
  .hero .tag{color:var(--gold2);font-weight:700;font-size:17px;text-shadow:0 1px 8px rgba(0,0,0,.5)}
  .hero .sub{color:rgba(246,234,208,.82);font-size:12.5px;margin-top:4px;text-shadow:0 1px 6px rgba(0,0,0,.5)}
  .hero .pill{margin-top:26px;display:inline-flex;align-items:center;gap:8px;background:linear-gradient(180deg,#f9e3a0,#e9bb5e 55%,#c8923c);color:#5a0f12;font-weight:700;border-radius:30px;padding:13px 26px;font-size:15px;cursor:pointer;border:none;font-family:var(--ser);box-shadow:0 8px 20px rgba(201,127,31,.45),inset 0 1px 0 rgba(255,255,255,.5)}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:4px 18px 8px}
  .card{background:linear-gradient(180deg,rgba(106,16,24,.9),rgba(74,10,17,.8));border:1px solid var(--line);border-radius:16px;padding:0;cursor:pointer;display:flex;flex-direction:column;position:relative;overflow:hidden}
  .card:active{border-color:var(--line2)}
  .card .cimg{width:100%;height:116px;object-fit:cover;display:block;background:#2a1012}
  .card .cimg-wrap{position:relative}
  .card .cimg-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(74,10,17,0) 55%,rgba(74,10,17,.85))}
  .card .cbody{padding:12px 15px 15px;display:flex;flex-direction:column;gap:3px;flex:1}
  .card .cn{font-size:18px;font-weight:700;color:var(--gold2)}
  .card .en{font-family:var(--cor);font-size:12px;color:var(--muted2);letter-spacing:1px}
  .card .accent{color:var(--red-a);filter:brightness(1.5);font-size:12px;font-weight:600;margin-top:6px}
  .card .csub{color:var(--muted2);font-size:11px;margin-top:auto;padding-top:4px}
  .tipbar{margin:8px 18px 14px;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:13px;padding:13px 15px;font-size:12.5px;color:var(--muted);line-height:1.5}
  .tipbar b{color:var(--gold2)}
  .memberbar{display:flex;align-items:center;gap:12px;margin:12px 18px 0;padding:12px 16px;border:1px solid var(--line2);border-radius:14px;background:linear-gradient(180deg,rgba(0,0,0,.22),rgba(0,0,0,.1));cursor:pointer}
  .memberbar:active{border-color:var(--gold)}
  .memberbar .mb-ico{width:26px;height:26px;flex:none}
  .memberbar .mb-ico svg{width:26px;height:26px}
  .memberbar .mb-txt{flex:1}
  .memberbar .mb-t{font-size:15px;font-weight:700;color:var(--gold2)}
  .memberbar .mb-s{font-size:11.5px;color:var(--muted2);margin-top:1px}
  .memberbar .mb-arrow{color:var(--gold);font-size:18px}
  .seclbl2{padding:16px 18px 2px;font-size:16px;color:var(--gold2);font-weight:700}
  .seclbl2 small{color:var(--muted2);font-weight:400;font-family:var(--cor);margin-left:7px;font-size:12px;letter-spacing:.5px}
  .pkgrow{display:flex;gap:13px;overflow-x:auto;padding:8px 18px 6px;scrollbar-width:none}
  .pkgrow::-webkit-scrollbar{display:none}
  .pkgcard{flex:none;width:212px;background:linear-gradient(180deg,rgba(106,16,24,.92),rgba(74,10,17,.82));border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer}
  .pkgcard:active{border-color:var(--line2)}
  .pkgcard .pimg{width:100%;height:112px;object-fit:cover;display:block}
  .pkgcard .pb{padding:11px 13px 13px}
  .pkgcard .pcn{font-size:16px;font-weight:700;color:var(--gold2)}
  .pkgcard .pen{font-family:var(--cor);font-size:11px;color:var(--muted2);letter-spacing:.5px}
  .pkgcard .prow{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
  .pkgcard .ppr{font-family:var(--cor);font-size:23px;font-weight:700;color:var(--gold2)}
  .pkgcard .pbadge{font-size:10px;font-weight:700;background:var(--red-a);color:#fff;border-radius:5px;padding:3px 8px}
  .pkgprog{display:flex;align-items:center;gap:10px;padding:8px 18px 2px}
  .pkgprog .bar{flex:1;height:5px;border-radius:3px;background:rgba(0,0,0,.32);overflow:hidden}
  .pkgprog .bar i{display:block;height:100%;background:linear-gradient(90deg,#c8923c,#f7da88);border-radius:3px;transition:width .3s}
  .pkgprog .txt{font-size:12px;color:var(--muted2);white-space:nowrap}
  .opt .qtyctl button[disabled]{opacity:.35;cursor:not-allowed}
  .list{padding:6px 18px}
  .opt{display:flex;align-items:center;gap:14px;background:linear-gradient(180deg,rgba(106,16,24,.8),rgba(74,10,17,.6));border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:13px;cursor:pointer;position:relative}
  .opt.sel{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold),0 6px 20px rgba(0,0,0,.3)}
  .opt .thumb{width:54px;height:54px;border-radius:12px;object-fit:cover;background:rgba(0,0,0,.3);flex:none}
  .opt .emoji{width:54px;height:54px;display:flex;align-items:center;justify-content:center;font-size:30px;flex:none}
  .opt .emoji{width:62px}
  .opt .emoji img{width:62px;height:auto;display:block;filter:drop-shadow(0 1px 5px rgba(0,0,0,.45))}
  .opt .info{flex:1;min-width:0}
  .opt .nm{font-size:17px;font-weight:700;color:var(--cream);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .opt .en{font-family:var(--cor);font-size:12.5px;color:var(--muted2)}
  .opt .ds{font-size:11.5px;color:var(--gold-d);margin-top:3px}
  .opt .feat{font-size:11.5px;color:#7fc08a;margin-top:2px}
  .hot{background:var(--red-a);color:#fff;font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px}
  .pick{background:rgba(247,218,136,.9);color:#5a0f12;font-size:10px;font-weight:700;border-radius:5px;padding:1px 6px}
  .opt .pr{font-family:var(--cor);font-size:24px;font-weight:700;color:var(--gold2);text-align:right;flex:none}
  .opt .pr small{display:block;font-size:11px;color:var(--gold-d);font-family:var(--ser)}
  .radio{width:24px;height:24px;border-radius:50%;border:2px solid var(--line2);flex:none}
  .opt.sel .check{background:linear-gradient(180deg,#f7da88,#c8923c);border:none;display:flex;align-items:center;justify-content:center;color:#5a0f12;font-weight:900}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:6px 18px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 18px}
  .gcell{background:linear-gradient(180deg,rgba(106,16,24,.8),rgba(74,10,17,.6));border:1px solid var(--line);border-radius:16px;padding:18px 10px;text-align:center;cursor:pointer;position:relative}
  .gcell.sel{border-color:var(--gold);background:linear-gradient(180deg,#a8312a,#7a1414);box-shadow:0 0 0 1px var(--gold)}
  .gcell .ge{font-size:26px}
  .gcell .chilis{display:inline-flex;gap:4px;align-items:flex-end;justify-content:center}
  .gcell .chili{height:36px;width:auto;filter:drop-shadow(0 2px 5px rgba(201,127,31,.45))}
  .opt .emoji svg{width:34px;height:34px;opacity:.6}
  .acard .aemoji svg{width:40px;height:40px;opacity:.55}
  .placeholder .pe svg{width:48px;height:48px;opacity:.6}
  .member-wrap{padding:8px 18px}
  .mlook{background:linear-gradient(180deg,rgba(122,20,28,.5),rgba(74,10,17,.28));border:1px solid var(--line2);border-radius:20px;padding:28px 22px;text-align:center;box-shadow:0 12px 30px rgba(0,0,0,.35)}
  .mlook .t{font-size:21px;font-weight:700;color:var(--gold2);font-family:var(--ser)}
  .mlook .s{font-size:13px;color:var(--muted2);margin:6px 0 20px}
  .mlook input{width:100%;background:rgba(0,0,0,.28);border:1px solid var(--line2);border-radius:13px;padding:15px 16px;color:var(--cream);font-size:17px;font-family:var(--cor);text-align:center;letter-spacing:3px;margin-bottom:14px;outline:none}
  .mlook input:focus{border-color:var(--gold)}
  .mlook .err{color:#ec9;font-size:13px;margin-top:12px}
  .mcard{background:linear-gradient(135deg,#7a1414,#a8312a 60%,#c0431f);border:1px solid rgba(247,218,136,.45);border-radius:20px;padding:22px;box-shadow:0 12px 30px rgba(0,0,0,.45);margin-bottom:14px}
  .mcard .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px}
  .mcard .nm{font-size:19px;font-weight:700;color:#fff}
  .mcard .ph{font-family:var(--cor);font-size:15px;color:rgba(255,235,200,.85);letter-spacing:1px}
  .mcard .stats{display:grid;grid-template-columns:1fr 1fr;gap:13px}
  .mcard .st{background:rgba(0,0,0,.24);border-radius:14px;padding:15px 12px;text-align:center}
  .mcard .lab{font-size:12px;color:rgba(255,235,200,.8)}
  .mcard .val{font-family:var(--cor);font-size:32px;font-weight:700;color:var(--gold2);margin:3px 0;line-height:1}
  .mcard .vs{font-size:11px;color:rgba(255,235,200,.75)}
  .mcard .note{margin-top:16px;text-align:center;font-size:12px;color:rgba(255,235,200,.85)}
  .gcell .brothimg{width:104px;height:auto;display:block;margin:0 auto 6px;filter:drop-shadow(0 5px 12px rgba(0,0,0,.5))}
  .gcell .gt{font-size:16px;font-weight:700;color:var(--cream);margin-top:6px}
  .gcell .gsub{font-family:var(--cor);font-size:11px;color:var(--muted2)}
  .gcell .rec{display:inline-block;margin-top:6px;background:rgba(247,218,136,.9);color:#5a0f12;font-size:10px;font-weight:700;border-radius:5px;padding:1px 7px}
  .seclbl{padding:8px 18px 2px;font-size:14px;color:var(--gold);font-weight:600;display:flex;align-items:center;gap:7px}
  .ctabs{display:flex;gap:15px;overflow-x:auto;padding:12px 18px 10px;scrollbar-width:none}
  .ctabs::-webkit-scrollbar{display:none}
  .ctab{flex:none;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
  .ctab .cic{width:58px;height:58px;border-radius:50%;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.18);transition:all .22s}
  .ctab .cic img{width:32px;height:32px;object-fit:contain}
  .ctab .clbl{position:relative;font-size:12.5px;color:var(--muted2);white-space:nowrap;transition:color .2s}
  .ctab.on .cic{background:radial-gradient(circle at 50% 34%,#f9e3a0,#e9bb5e 58%,#c8923c);border-color:#f7da88;box-shadow:0 5px 16px rgba(201,127,31,.5),inset 0 1px 0 rgba(255,255,255,.5)}
  .ctab.on .cic img{filter:brightness(.2) saturate(1.4)}
  .ctab.on .clbl{color:var(--gold2);font-weight:700}
  .ctab.on .clbl::after{content:'';position:absolute;left:50%;transform:translateX(-50%);bottom:-6px;width:18px;height:2px;background:var(--gold);border-radius:2px}
  .addon-head{position:sticky;top:0;z-index:6;background:linear-gradient(180deg,#520d15,#470a11 92%);box-shadow:0 10px 18px rgba(0,0,0,.32)}
  .acat-h{display:flex;align-items:center;gap:9px;padding:16px 18px 4px;color:var(--gold2);font-weight:700;font-size:17px}
  .acat-h img{width:24px;height:24px;object-fit:contain}
  .agrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:6px 18px}
  .acard{background:linear-gradient(180deg,rgba(106,16,24,.8),rgba(74,10,17,.6));border:1px solid var(--line);border-radius:15px;padding:12px;display:flex;flex-direction:column;gap:4px;position:relative}
  .acard .ai{width:100%;height:78px;border-radius:10px;object-fit:cover;background:rgba(0,0,0,.3)}
  .acard .aemoji{width:100%;height:78px;border-radius:10px;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:34px}
  .acard .an{font-size:14px;font-weight:700;color:var(--cream);margin-top:4px;line-height:1.2}
  .acard .ae{font-family:var(--cor);font-size:11px;color:var(--muted2)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:4px;align-self:flex-start}
  .seg button{border:none;background:transparent;color:var(--muted2);font-family:var(--ser);font-size:11px;padding:4px 10px;cursor:pointer}
  .seg button.on{background:linear-gradient(180deg,#f7da88,#c8923c);color:#5a0f12;font-weight:700}
  .acard .arow{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .acard .ap{font-family:var(--cor);font-size:18px;font-weight:700;color:var(--gold2)}
  .acard .ap small{font-size:10px;color:var(--gold-d);font-family:var(--ser)}
  .acard .ap.mk{font-family:var(--ser);font-size:14px;color:var(--muted)}
  .addbtn{width:30px;height:30px;border-radius:50%;border:none;background:linear-gradient(180deg,#f7da88,#c8923c);color:#5a0f12;font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
  .qtyctl{display:flex;align-items:center;gap:10px}
  .qtyctl button{width:28px;height:28px;border-radius:50%;border:1px solid var(--line2);background:rgba(0,0,0,.2);color:var(--gold);font-size:17px;cursor:pointer}
  .qtyctl .qn{font-family:var(--cor);font-size:17px;color:var(--gold2);min-width:16px;text-align:center}
  .conf{background:linear-gradient(180deg,rgba(106,16,24,.7),rgba(74,10,17,.5));border:1px solid var(--line);border-radius:18px;margin:8px 18px;padding:18px}
  .conf .ch{font-size:14px;color:var(--gold);font-weight:700;margin-bottom:6px;display:flex;gap:7px;align-items:center}
  .conf .mainrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .conf .mainrow .nm{font-size:17px;font-weight:700;color:var(--cream)}
  .conf .mainrow .pr{font-family:var(--cor);font-size:18px;color:var(--gold2);font-weight:700}
  .conf .line{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(233,196,119,.12);font-size:14px;color:var(--muted)}
  .conf .line .v{color:var(--cream)}
  .total{display:flex;justify-content:space-between;align-items:center;margin:8px 18px;background:rgba(0,0,0,.25);border:1px solid var(--line2);border-radius:16px;padding:16px 20px}
  .total .tl{font-size:17px;font-weight:700;color:var(--cream)}
  .total .tv{font-family:var(--cor);font-size:32px;font-weight:700;color:var(--gold2)}
  .total .tv small{font-size:12px;color:var(--gold-d);font-family:var(--ser);display:block;text-align:right}
  #screen{flex:1;min-height:0;display:flex;flex-direction:column}
  #bottomnav{position:absolute;left:0;right:0;bottom:0;z-index:20;display:flex;padding:24px 0 calc(10px + env(safe-area-inset-bottom));
    background:linear-gradient(180deg,rgba(74,12,20,.30),rgba(44,7,12,.55));
    backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
    border-top:1px solid rgba(247,218,136,.18);
    box-shadow:0 -10px 30px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.12)}
  #app.navon .scroll{padding-bottom:calc(90px + env(safe-area-inset-bottom))}
  .cartcta{padding:14px 18px 4px}
  #bottomnav.hide{display:none}
  .navtab{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted2);font-size:11.5px;cursor:pointer;z-index:1;position:relative}
  .navbadge{position:absolute;top:-4px;left:calc(50% + 7px);min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:linear-gradient(180deg,#f9e09a,#e0b24e);color:#5a0f12;font-size:10.5px;font-weight:700;font-family:var(--cor);display:none;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.4);z-index:3}
  .navbadge.show{display:flex}
  .navtab .navico{width:23px;height:23px;display:block;transition:opacity .2s}
  .navtab .navico svg{width:23px;height:23px;display:block}
  .navtab.on{color:var(--gold2)}
  .navtab.on .navico{opacity:0}
  .navcircle{position:absolute;top:-20px;width:56px;height:56px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%,#f9e09a,#e9bb5e 56%,#c8923c);
    box-shadow:0 9px 24px rgba(201,127,31,.5),0 2px 6px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.55);
    display:flex;align-items:center;justify-content:center;transform:translateX(-50%);
    transition:left .36s cubic-bezier(.34,1.45,.5,1);z-index:2;pointer-events:none}
  .navcircle svg{width:26px;height:26px}
  .placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted2);gap:10px;padding:40px}
  .placeholder .pe{font-size:40px;opacity:.6}
  .cartbar{position:sticky;bottom:0;margin:0;display:flex;align-items:center;gap:12px;padding:12px 18px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(0deg,#480a11 70%,transparent)}
  .cartbar .ci{flex:1}
  .cartbar .cl{font-size:12px;color:var(--muted2)}
  .cartbar .cv{font-family:var(--cor);font-size:24px;font-weight:700;color:var(--gold2)}
  .cartlist{padding:6px 18px 0;display:flex;flex-direction:column;gap:10px}
  .crow{display:flex;gap:12px;align-items:center;background:linear-gradient(180deg,rgba(106,16,24,.6),rgba(74,10,17,.4));border:1px solid var(--line);border-radius:16px;padding:11px}
  .cthumb{width:60px;height:60px;border-radius:12px;object-fit:cover;flex:none}
  .cthumb.ph{display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.25)}
  .cthumb.ph svg{width:30px;height:30px}
  .cmid{flex:1;min-width:0}
  .ctitle{font-size:15px;font-weight:700;color:var(--cream)}
  .csub{font-size:11.5px;color:var(--muted2);margin-top:2px;line-height:1.45}
  .cprice{font-family:var(--cor);font-size:16px;color:var(--gold2);font-weight:700;margin-top:5px}
  .cright{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex:none}
  .crm{background:none;border:none;color:var(--muted2);font-size:21px;line-height:.8;cursor:pointer;padding:0 2px}
  .cqty{display:flex;align-items:center;gap:9px;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:30px;padding:4px 6px}
  .cqty button{width:26px;height:26px;border-radius:50%;border:1px solid var(--line2);background:rgba(0,0,0,.2);color:var(--gold);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .cqty span{font-family:var(--cor);font-size:15px;color:var(--gold2);min-width:13px;text-align:center}
  .cartsum{margin:14px 18px 0;background:rgba(0,0,0,.25);border:1px solid var(--line2);border-radius:16px;padding:14px 18px}
  .cartsum .srow{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);padding:5px 0}
  .cartsum .srow span:last-child{color:var(--cream);font-family:var(--cor)}
  .cartsum .srow.tbd{color:var(--gold-d);font-size:12.5px}
  .cartsum .srow.tot{border-top:1px solid var(--line);margin-top:5px;padding-top:11px;font-size:17px;font-weight:700;color:var(--cream)}
  .cartsum .srow.tot span:last-child{color:var(--gold2);font-size:20px;font-weight:700}
  .toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(10px);background:rgba(20,4,6,.92);border:1px solid var(--line2);color:var(--gold2);padding:11px 22px;border-radius:30px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .histlist{padding:6px 18px 0;display:flex;flex-direction:column;gap:10px}
  .ocard{background:linear-gradient(180deg,rgba(74,10,17,.55),rgba(40,6,9,.4));border:1px solid var(--line);border-radius:16px;padding:14px 16px}
  .ohead{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .ono{font-family:var(--cor);font-size:17px;font-weight:700;color:var(--gold2)}
  .ostatus{font-size:11px;color:#7be0a6;border:1px solid rgba(123,224,166,.35);background:rgba(123,224,166,.1);border-radius:20px;padding:2px 9px}
  .otime{margin-left:auto;font-size:12px;color:var(--muted2);font-family:var(--cor)}
  .oline{display:flex;justify-content:space-between;gap:10px;font-size:13px;color:var(--muted);padding:5px 0;border-bottom:1px solid rgba(233,196,119,.1)}
  .oline span:last-child{color:var(--cream);font-family:var(--cor);white-space:nowrap}
  .oline.sub{color:var(--muted2)}
  .ofoot{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
  .ofoot .ol{font-size:13px;color:var(--muted)}
  .otot{font-family:var(--cor);font-size:18px;font-weight:700;color:var(--gold2)}
</style>
</head>
<body>
<div id="app"></div>
<script>
const M = window.SEASPICE;
const C = M.currency;
const money = n => '$'+(Math.round(n*100)/100).toFixed(2);
const halfP = p => Math.ceil(p*60)/100;           // 半份 = 60% of full, round up to cent
const addonById = id => M.addons.find(a=>a.id===id);

const FISH = M.fish, BROTHS = M.broths;
const DIRECT_UPGRADE = 5;  // 冷锅鱼/酸菜鱼: optional 升级鸳鸯锅 = +$5
// 鱼火锅(fhp): required inner broth (4 options, $30) · 冷锅鱼/酸菜鱼(direct): optional upgrade (原汤+番茄, +$5)
function brothList(){ return S.order.mode==='direct' ? BROTHS.filter(b=>b.id==='orig'||b.id==='tom') : BROTHS; }
const NUMB = [{k:'特麻',lv:3},{k:'中麻',lv:2,rec:1},{k:'微麻',lv:1}];
const SPICY= [{k:'特辣',lv:3},{k:'中辣',lv:2,rec:1},{k:'微辣',lv:1}];
const COOK = [
  {k:'全入辣锅',en:'All In Spicy',d:'全部鱼肉入辣锅，汤底更鲜浓',rec:1},
  {k:'半入辣锅',en:'Half In Spicy',d:'默认鱼肉全部放辣锅，如需留鱼到原汤请备注',rec:1},
  {k:'自行涮煮',en:'Self Cook',d:'鱼肉不预先入锅，自行涮烫享用'},
];
// real pot icons cropped from the client's design
const COOK_ICON = [
  '<img src="assets/icons/cook-full.png" alt="">',
  '<img src="assets/icons/cook-half.png" alt="">',
  '<img src="assets/icons/cook-self.png" alt="">',
];
// fallback food-bowl icon for items without a photo, + chili icon for spice levels
const PLACE_ICON=`<svg viewBox="0 0 24 24" fill="none" stroke="#cda968" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 12h17"/><path d="M5.5 12a6.5 6.5 0 0 0 13 0"/><path d="M8.5 4.6c-.6.8-.6 1.3 0 2.1M12 4.1c-.6.8-.6 1.3 0 2.1M15.5 4.6c-.6.8-.6 1.3 0 2.1"/></svg>`;
const CHILI=`<img class="chili" src="assets/icons/chili.png" alt="">`;
const chiliRow=n=>`<span class="chilis">${CHILI.repeat(n)}</span>`;

const S = {
  pax:2, screen:'pax', tab:'menu', addonTab:M.addonCats[0],
  order:{fish:null,numb:1,spicy:1,cook:1,broth:0,dish:'鱼火锅',mode:'fhp'},
  addons:{},   // key `${id}|full|half` -> qty
  por:{},      // id -> 'full'|'half' (current toggle)
  pkgId:null, pkgStep:0, pkgSel:{},   // set-package wizard
  flow:null,                          // 'fish' | 'hotpot' | null(standalone add-ons)
  hp:{potType:null,broths:[]},        // 单点火锅 DIY hotpot
  member:null,                        // 会员查询 (read-only, from POS)
  cart:[],                            // 购物车 line items -> shown on 订单 tab
  orders:[],                          // 历史订单 placed this session (newest first)
};
let _cid=0;

const app = document.getElementById('app');

// ---- bottom nav (floating animated circle, our style) ----
const ICO = {
  menu:c=>`<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 11h19"/><path d="M4.5 11a7.5 7.5 0 0 0 15 0"/><path d="M8.5 3.2c-.7.8-.7 1.4 0 2.2M12 2.8c-.7.8-.7 1.4 0 2.2M15.5 3.2c-.7.8-.7 1.4 0 2.2"/></svg>`,
  orders:c=>`<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2.2"/><path d="M9 3.2h6V6H9z"/><path d="M8.6 11h6.8M8.6 15h4.4"/></svg>`,
  me:c=>`<svg viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M5 20c0-3.6 3.1-5.6 7-5.6s7 2 7 5.6"/></svg>`,
};
const TABS=[{cn:'菜单',ico:'menu',screen:'hub'},{cn:'订单',ico:'orders',screen:'orders'},{cn:'我的',ico:'me',screen:'me'}];
const NAV_SCREENS=['hub','orders','me'];
let screenEl,navEl,circleEl;
function navHTML(){
  const tabs=TABS.map((t,i)=>`<div class="navtab" data-i="${i}" onclick="switchTab(${i})"><span class="navico">${ICO[t.ico]('#e9c477')}</span>${t.cn}${i===1?'<span class="navbadge" id="navbadge"></span>':''}</div>`).join('');
  return `<div id="bottomnav" class="hide"><div class="navcircle" id="navcircle"></div>${tabs}</div>`;
}
function mountShell(){
  app.innerHTML='<div id="screen"></div>'+navHTML();
  screenEl=document.getElementById('screen'); navEl=document.getElementById('bottomnav'); circleEl=document.getElementById('navcircle');
}
function updateNav(){
  const show=NAV_SCREENS.includes(S.screen);
  navEl.classList.toggle('hide',!show);
  app.classList.toggle('navon',show);
  if(!show) return;
  const idx=Math.max(0,TABS.findIndex(t=>t.screen===S.screen));
  circleEl.style.left=((2*idx+1)/6*100)+'%';
  circleEl.innerHTML=ICO[TABS[idx].ico]('#5a0f12');
  navEl.querySelectorAll('.navtab').forEach((el,i)=>el.classList.toggle('on',i===idx));
  updateCartBadge();
}
function updateCartBadge(){ const b=document.getElementById('navbadge'); if(!b)return; const n=S.cart.reduce((s,c)=>s+c.qty,0); b.textContent=n>99?'99+':n; b.classList.toggle('show',n>0); }
window.switchTab=function(i){ go(TABS[i].screen); }
function go(s){ S.screen=s; render(); const sc=screenEl.querySelector('.scroll'); if(sc)sc.scrollTop=0; }

function topbar(){
  return `<div class="topbar">
    <div class="brand"><span class="cn">Sea &amp; Spice</span></div>
    <div class="spacer"></div>
    <span class="chip">桌号 ${M.table}</span><span class="chip lang">中 / EN</span></div>`;
}

function scrPax(){
  const cp=M.condiment.price, sub=S.pax*cp;
  const presets=[1,2,3,4,5,6].map(n=>`<div class="preset ${S.pax===n?'on':''}" onclick="setPax(${n})">${n}</div>`).join('');
  return `<div class="screen pax-wrap">
    <div class="welcome">
      <button class="langbtn">中文 ▾</button>
      <img class="wlogo" src="assets/logo.png" alt="Sea & Spice">
      <div class="wtitle"><img class="orn" src="assets/ornament.png" alt=""><span class="txt">欢迎光临</span><img class="orn flip" src="assets/ornament.png" alt=""></div>
    </div>
    <div class="pax-body">
      <div class="pax-card">
        <div class="pax-q">今天几位用餐？</div>
        <div class="pax-note">调料费 ${money(cp)}/位 · 自动计入账单</div>
        <div class="stepper">
          <button class="stepbtn" onclick="setPax(${Math.max(1,S.pax-1)})">−</button>
          <div class="pax-numwrap"><span class="pax-num">${S.pax}</span><span class="pax-unit">位</span></div>
          <button class="stepbtn" onclick="setPax(${S.pax+1})">+</button>
        </div>
        <div class="presets">${presets}</div>
        <div class="pax-subline">调料费小计 <b>${money(sub)}</b>${C} <span class="calc">· ${S.pax}位 × ${money(cp)}</span></div>
      </div>
    </div>
    <div class="pax-foot"><button class="cta pax-cta" onclick="go('hub')">开始点单 →</button></div></div>`;
}
window.setPax=function(n){ S.pax=Math.max(1,n); render(); }

function scrHub(){
  return `<div class="screen scroll">${topbar()}
    <div class="memberbar" onclick="go('me')">
      <span class="mb-ico">${ICO.me('#e9c477')}</span>
      <div class="mb-txt"><div class="mb-t">会员查询 Member</div><div class="mb-s">输入手机号查积分 · 余额</div></div>
      <span class="mb-arrow">→</span></div>
    <div class="hero"><div class="herobg" style="background-image:url('assets/hero.jpg')"></div><div class="heroveil"></div>
      <div class="badges"><span class="bdg">招牌特色</span><span class="bdg">本店独创</span></div>
      <h1>鱼火锅</h1><div class="tag">一锅两吃 · 先鲜后烫</div><div class="sub">外圈嫩滑鱼肉 · 内圈涮烫百味</div>
      <button class="pill" onclick="startFish('鱼火锅','fhp')">立即选择 →</button></div>
    <div class="seclbl2">超值套餐 <small>SET PACKAGES · 已含调料</small></div>
    <div class="pkgrow">${M.packages.map(pkgCard).join('')}</div>
    <div class="divider">或 单 独 点 选</div>
    <div class="cards">
      ${hubCard('assets/menu/0101.jpg','冷锅鱼','Cold Pot Fish','红油翻滚·麻辣鲜香','鲈鱼·盲曹·星斑',"startFish('冷锅鱼','direct')")}
      ${hubCard('assets/menu/0201.jpg','酸菜鱼','Pickled Fish','黄金酸汤·清爽开胃','鲈鱼·盲曹·星斑',"startFish('酸菜鱼','direct')")}
      ${hubCard('assets/menu/0112.jpg','单点火锅','Hot Pot','多种精选锅底','鸳鸯·奔驰锅',"startHotpot()")}
      ${hubCard('assets/menu/0402.jpg','配菜加点','Add-ons','自由加购','荤素·主食·饮料',"startAddons()")}
    </div>
    <div class="tipbar">首次光临？推荐体验本店招牌 <b>「鱼火锅」</b> —— 一锅两吃，感受双重鲜味</div>
    <div style="height:8px"></div></div>`;
}
function hubCard(img,cn,en,accent,sub,act){
  return `<div class="card" onclick="${act}"><div class="cimg-wrap"><img class="cimg" src="${img}" alt=""></div>
    <div class="cbody"><div class="cn">${cn}</div><div class="en">${en}</div>
    <div class="accent">${accent}</div><div class="csub">${sub}</div></div></div>`;
}

// ---- set packages (multi-step wizard) ----
const pkgById = id => M.packages.find(p=>p.id===id);
function pkgCard(p){
  const badge = p.save?`立省 $${p.save}`:(p.fixed?'含饮品':`${p.pax} 人`);
  return `<div class="pkgcard" onclick="startPackage(${p.id})">
    <img class="pimg" src="${p.img}" alt="">
    <div class="pb"><div class="pcn">${p.cn}</div><div class="pen">${p.en}</div>
      <div class="prow"><span class="ppr">${money(p.price)}</span><span class="pbadge">${badge}</span></div></div></div>`;
}
window.startPackage=function(id){ S.pkgId=id; S.pkgSel={}; S.pkgStep=0; go(pkgById(id).fixed?'pkgconfirm':'pkgstep'); }

function scrPkgStep(){
  const p=pkgById(S.pkgId), n=p.groups.length, g=p.groups[S.pkgStep], multi=g.pick>1;
  let body,enabled;
  const meta=o=>`${o.img?`<img class="thumb" src="${o.img}">`:`<div class="emoji">${PLACE_ICON}</div>`}
    <div class="info"><div class="nm">${o.n}</div>${o.en?`<div class="en">${o.en}</div>`:''}${o.desc?`<div class="ds">${o.desc}</div>`:''}</div>`;
  if(multi){
    const sel=S.pkgSel[S.pkgStep]||{}, total=Object.values(sel).reduce((a,b)=>a+b,0);
    enabled=total===g.pick;
    body=`<div class="list">`+g.opts.map(o=>{const q=sel[o.n]||0;
      return `<div class="opt ${q>0?'sel':''}">${meta(o)}
        <div class="qtyctl"><button onclick="pkgQty('${o.n}',-1)" ${q<=0?'disabled':''}>−</button><span class="qn">${q}</span><button onclick="pkgQty('${o.n}',1)" ${total>=g.pick?'disabled':''}>+</button></div></div>`;
    }).join('')+`</div>`;
  } else {
    const sel=S.pkgSel[S.pkgStep]; enabled=sel!=null;
    body=`<div class="list">`+g.opts.map(o=>{const on=sel===o.n;
      return `<div class="opt ${on?'sel':''}" onclick="pkgPick('${o.n}')">${meta(o)}<div class="radio ${on?'check':''}">${on?'✓':''}</div></div>`;
    }).join('')+`</div>`;
  }
  const last=S.pkgStep===n-1;
  return `<div class="screen scroll">
    <div class="backrow"><button class="back" onclick="pkgBack()">← 返回</button>
      <div><div class="htitle">${p.cn} · ${g.label}</div><div class="hsub">${g.en} · 选 ${g.pick} 份</div></div></div>
    <div class="pkgprog"><div class="bar"><i style="width:${(S.pkgStep+1)/n*100}%"></i></div><span class="txt">第 ${S.pkgStep+1} / ${n} 步</span></div>
    ${body}<div style="height:8px"></div>
    <div class="footer"><button class="cta ${enabled?'':'disabled'}" onclick="${enabled?'pkgNext()':''}">${last?'完成 · 去确认 →':'下一步 →'}</button></div>
  </div>`;
}
window.pkgPick=function(o){ S.pkgSel[S.pkgStep]=o; render(); }

let _lastCat=-1;
function centerTab(sc,i){   // scroll ONLY the tab strip horizontally (won't cancel the vertical smooth scroll)
  const wrap=sc.querySelector('.ctabs'), t=sc.querySelectorAll('.ctab')[i];
  if(wrap&&t) wrap.scrollTo({left:t.offsetLeft - wrap.clientWidth/2 + t.offsetWidth/2, behavior:'smooth'});
}
function addonSpy(sc){
  const head=sc.querySelector('.addon-head'); if(!head)return;
  const hb=head.getBoundingClientRect().bottom; let cur=0;
  for(let i=0;i<M.addonCats.length;i++){ const sec=sc.querySelector('#cat-'+i); if(sec&&sec.getBoundingClientRect().top<=hb+14) cur=i; }
  if(cur===_lastCat) return; _lastCat=cur; S.addonTab=M.addonCats[cur];
  sc.querySelectorAll('.ctab').forEach((t,i)=>t.classList.toggle('on',i===cur));
  centerTab(sc,cur);
}
function attachAddonScroll(){
  const sc=screenEl.querySelector('.scroll'); if(!sc)return; _lastCat=-1; let raf=null;
  // bottom spacer so the last category can scroll up under the sticky header
  const acats=sc.querySelectorAll('.acat'), last=acats[acats.length-1];
  const head=sc.querySelector('.addon-head'), cart=sc.querySelector('.cartbar'), spacer=sc.querySelector('.addon-spacer');
  if(spacer&&head&&last){
    const need=sc.clientHeight - head.offsetHeight - (cart?cart.offsetHeight:0) - last.offsetHeight + 24;
    spacer.style.height=Math.max(16,need)+'px';
  }
  sc.onscroll=()=>{ if(raf)return; raf=requestAnimationFrame(()=>{raf=null;addonSpy(sc);}); };
  addonSpy(sc);
}
window.scrollToCat=function(i){
  const sc=screenEl.querySelector('.scroll'),sec=sc.querySelector('#cat-'+i),head=sc.querySelector('.addon-head');
  const top=sec.getBoundingClientRect().top - sc.getBoundingClientRect().top + sc.scrollTop - head.offsetHeight - 4;
  _lastCat=i; S.addonTab=M.addonCats[i];
  sc.querySelectorAll('.ctab').forEach((t,idx)=>t.classList.toggle('on',idx===i));

  sc.scrollTo({top,behavior:'smooth'});
}

  } else {
    body=`<div class="mlook">
      <div class="t">会员查询</div><div class="s">输入手机号查询积分与余额</div>
      <input id="m_phone" type="tel" inputmode="numeric" placeholder="手机号 Phone" value="${(m&&m.phone)||''}">
      <button class="cta" onclick="doLookup()">查询 →</button>
      ${m&&m.notFound?'<div class="err">未找到该会员，请确认手机号</div>':''}</div>`;
  }
  return `<div class="screen scroll">${topbar()}
    <div class="seclbl2" style="padding:10px 18px 0">我的会员 <small>MEMBER</small></div>
    <div class="member-wrap">${body}</div></div>`;
}
window.doLookup=function(){
  const el=document.getElementById('m_phone'); const raw=((el&&el.value)||'').replace(/\s/g,'').trim();
  const phone=raw||'0412 888 888';   // demo: show mock points even if no number entered
  S.member={phone,data:lookupMember(phone.replace(/\D/g,''))}; render();
}
window.resetMember=function(){ S.member=null; render(); }  // back to the lookup form
// === POS member lookup — READ-ONLY. Points + balance are owned by the POS (3rd-party company). ===
// TODO: replace this stub with the live POS member API (lookup by phone -> {name, points, balance}); return null if not found.
function lookupMember(phone){
  let h=0; for(const c of phone) h=(h*31+c.charCodeAt(0))>>>0;   // demo data until POS is connected
  return { name:'会员 ·'+phone.slice(-4), points: 80+(h%1920), balance: (h%46)*10 };
}

// ---- 购物车 Cart (shown on 订单 tab) ----
function pushCart(item){
  if(item.key){ const ex=S.cart.find(c=>c.key===item.key); if(ex){ ex.qty+=item.qty; return; } }
  item.cid=++_cid; S.cart.push(item);
}
function resetOrder(){ S.flow=null; S.order={fish:null,numb:1,spicy:1,cook:1,broth:0,dish:'鱼火锅',mode:'fhp'}; S.addons={}; S.por={}; S.hp={potType:null,broths:[]}; }
window.addOrderToCart=function(){
  if(S.flow==='fish' && S.order.fish!==null){
    const f=FISH[S.order.fish], direct=S.order.mode==='direct';
    const b=S.order.broth!=null?brothList()[S.order.broth]:null;
    const unit=f.price + (direct?(b?DIRECT_UPGRADE:0):M.potFee);
    const brothTxt = direct ? (b?`升级·${b.cn}`:'纯享鱼·不升级') : `内圈·${b.cn}`;
    const sub=`${NUMB[S.order.numb].k}·${SPICY[S.order.spicy].k} · ${COOK[S.order.cook].k} · ${brothTxt}`;
    pushCart({type:'fish',title:`${S.order.dish} · ${f.cn}`,sub,img:f.img,qty:1,unit,needsCondiment:true});
  } else if(S.flow==='hotpot' && S.hp.potType){
    const pot=POTS.find(p=>p.id===S.hp.potType);
    const broths=S.hp.broths.map(id=>(BROTHS.find(b=>b.id===id)||{}).cn).join('、');
    pushCart({type:'hotpot',title:`单点火锅 · ${pot?pot.cn:''}`,sub:`锅底·${broths}`,img:'assets/menu/0112.jpg',qty:1,unit:M.potFee,needsCondiment:true});
  }
  addonLineItems().forEach(l=>pushCart({type:'addon',key:`addon|${l.it.id}|${l.por}`,
    title:l.it.cn+(l.por==='half'?'（半份）':''),sub:'加购配菜',img:l.it.img,qty:l.qty,unit:l.unit,needsCondiment:false}));
  resetOrder(); toast('已加入购物车 ✓'); go('orders');
}
window.addPkgToCart=function(){
  const p=pkgById(S.pkgId);
  const sub = p.fixed ? '套餐 · 含饮品'
    : p.groups.map((g,i)=>{const sel=S.pkgSel[i]; return g.pick>1?Object.entries(sel||{}).map(([o,q])=>`${o}×${q}`).join('+'):(sel||'—');}).join(' · ');
  pushCart({type:'package',title:p.cn,sub,img:p.img,qty:1,unit:p.price,needsCondiment:false});
  S.pkgId=null; S.pkgSel={}; S.pkgStep=0; toast('已加入购物车 ✓'); go('orders');
}
window.cartQty=function(cid,d){ const c=S.cart.find(x=>x.cid===cid); if(!c)return; c.qty+=d; if(c.qty<=0)S.cart=S.cart.filter(x=>x.cid!==cid); render(); }
window.cartRemove=function(cid){ S.cart=S.cart.filter(x=>x.cid!==cid); render(); }
window.placeOrder=function(){
  if(!S.cart.length)return;
  const cond=cartCondiment(), total=cartItemsTotal()+cond;
  const d=new Date(), p2=n=>String(n).padStart(2,'0');
  const no='#'+String(S.orders.length+1).padStart(3,'0');
  S.orders.unshift({ no, time:p2(d.getHours())+':'+p2(d.getMinutes()), status:'备餐中 Preparing',
    items:S.cart.map(c=>({title:c.title,qty:c.qty,unit:c.unit})), condiment:cond, total });
  S.cart=[]; toast('已下单 ✓ '+no); go('orders');
}
function orderCard(o){
  const lines=o.items.map(it=>`<div class="oline"><span>${it.title}${it.qty>1?` ×${it.qty}`:''}</span><span>${it.unit==null?'时价':money(it.unit*it.qty)+' '+C}</span></div>`).join('')
    + (o.condiment>0?`<div class="oline sub"><span>调料费</span><span>${money(o.condiment)} ${C}</span></div>`:'');
  return `<div class="ocard"><div class="ohead"><span class="ono">${o.no}</span><span class="ostatus">${o.status}</span><span class="otime">${o.time}</span></div>
    ${lines}<div class="ofoot"><span class="ol">合计 Total</span><span class="otot">${money(o.total)} ${C}</span></div></div>`;
}
function cartItemsTotal(){ return S.cart.reduce((s,c)=>s+(c.unit||0)*c.qty,0); }
function cartCondiment(){ return S.cart.some(c=>c.needsCondiment)? S.pax*M.condiment.price : 0; }
function cartRow(c){
  const price=c.unit==null?'时价':money(c.unit*c.qty)+' '+C;
  return `<div class="crow">
    ${c.img?`<img class="cthumb" src="${c.img}" alt="">`:`<div class="cthumb ph">${PLACE_ICON}</div>`}
    <div class="cmid"><div class="ctitle">${c.title}</div>${c.sub?`<div class="csub">${c.sub}</div>`:''}
      <div class="cprice">${price}</div></div>
    <div class="cright"><button class="crm" onclick="cartRemove(${c.cid})" aria-label="remove">×</button>
      <div class="cqty"><button onclick="cartQty(${c.cid},-1)">−</button><span>${c.qty}</span><button onclick="cartQty(${c.cid},1)">+</button></div></div>
  </div>`;
}
function scrOrders(){
  const hasCart=S.cart.length>0, hasHist=S.orders.length>0;
  if(!hasCart && !hasHist){
    return `<div class="screen scroll">${topbar()}<div class="placeholder"><div class="pe">${ICO.orders('#cda968')}</div>
      <div style="font-size:18px;color:var(--gold2)">还没有订单</div><div>先去菜单挑选喜欢的菜品</div>
      <button class="cta" style="width:auto;padding:12px 28px;margin-top:6px" onclick="go('hub')">去点单 →</button></div></div>`;
  }
  const cp=M.condiment.price, items=cartItemsTotal(), cond=cartCondiment(), total=items+cond;
  const hasTBD=S.cart.some(c=>c.unit==null);
  const cartSection = hasCart ? `
    <div class="seclbl2" style="padding:10px 18px 0">本次点单 <small>CART · 桌号 ${M.table}</small></div>
    <div class="cartlist">${S.cart.map(cartRow).join('')}</div>
    <div class="cartsum">
      <div class="srow"><span>小计 Subtotal</span><span>${money(items)} ${C}</span></div>
      ${cond>0?`<div class="srow"><span>调料费 (${S.pax}位 × ${money(cp)})</span><span>${money(cond)} ${C}</span></div>`:''}
      ${hasTBD?`<div class="srow tbd"><span>含时价项目</span><span>结账时确认</span></div>`:''}
      <div class="srow tot"><span>合计 Total</span><span>${money(total)} ${C}</span></div></div>
    <div class="cartcta"><button class="cta" onclick="placeOrder()">确认下单 · ${money(total)} ${C}</button></div>` : '';
  const histSection = hasHist ? `
    <div class="seclbl2" style="padding:${hasCart?'20':'10'}px 18px 0">历史订单 <small>ORDER HISTORY · ${S.orders.length}</small></div>
    <div class="histlist">${S.orders.map(orderCard).join('')}</div>` : '';
  return `<div class="screen scroll">${topbar()}${cartSection}${histSection}</div>`;
}
function toast(msg){
  let t=document.getElementById('toast'); if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),1700);
}

function flowScreen(title,sub,content,enabled,ctaLabel,ctaAct){
  return `<div class="screen scroll">
    <div class="backrow"><button class="back" onclick="flowBack()">← 返回</button>
      <div><div class="htitle">${title}</div><div class="hsub">${sub}</div></div></div>
    ${content}<div style="height:8px"></div>
    <div class="footer"><button class="cta ${enabled?'':'disabled'}" onclick="${enabled?ctaAct:''}">${ctaLabel}</button></div></div>`;
}
const FLOW=['fish','spice','cook','broth','addons'];
window.flowBack=function(){ const i=FLOW.indexOf(S.screen); if(i<=0)go('hub'); else go(FLOW[i-1]); }

let _prevScreen=null;
function render(){
  const m={pax:scrPax,hub:scrHub,fish:scrFish,spice:scrSpice,cook:scrCook,broth:scrBroth,
    addons:scrAddons,confirm:scrConfirm,hotpot:scrHotpot,pkgstep:scrPkgStep,pkgconfirm:scrPkgConfirm,orders:scrOrders,me:scrMe};
  const old=screenEl.querySelector('.scroll'); const keep=old?old.scrollTop:0;
  const same=(S.screen===_prevScreen);
  screenEl.innerHTML=(m[S.screen]||scrHub)();
  if(same){ const scr=screenEl.querySelector('.screen'); if(scr) scr.style.animation='none'; }  // no entrance re-animation on in-screen taps
  updateNav();
  const neu=screenEl.querySelector('.scroll');
  if(neu && same) neu.scrollTop=keep;   // keep position on in-screen updates
  _prevScreen=S.screen;
  if(S.screen==='addons') attachAddonScroll();
}
mountShell();
render();
</script>
</body>
</html>
